version: '3.8'

services:
  # menjalankan dockerfile
  scrapper:
    build: .
    volumes:
      - .:/app
    environment:
      - DB_SERVER=sql-server
      - MINIO_ENDPOINT=http://minio:9000
    networks:
      - de-network
    depends_on:
      - sql-server
      - minio
  # 1. SQL Server
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=<YOUR_PASSWORD>
    networks:
      - de-network
  
  # 2. PostgreSQL
  postgres_db:
    image: postgres:15
    container_name: postgres_db
    environment:
      - POSTGRES_USER=<YOUR_USERNAME>
      - POSTGRES_PASSWORD=<YOUR_PASSWORD>
      - POSTGRES_DB=<YOUR_DB>
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5433:5432"
    networks:
      - de-network

  # 3. MinIO
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000" 
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=<YOUR_USERNAME>
      - MINIO_ROOT_PASSWORD=<YOUR_PASSWORD>
    command: server /data --console-address ":9001"
    networks:
      - de-network

  # 4. Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    networks:
      - de-network

  # 5. Kafka
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - de-network
  
  # 6. Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - de-network

  # 7. Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - de-network

  # 8. Airflow
  airflow:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow
    # UID penting di Linux/WSL agar gak ada isu permission folder
    user: "${AIRFLOW_UID:-1000}:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://<YOUR_USERNAME>:<YOUR_PASSWORD>@postgres_db:5432/<YOUR_DB>
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=<YOUR_USERNAME>
      - _AIRFLOW_WWW_USER_PASSWORD=<YOUR_PASSWORD>
      - _AIRFLOW_WWW_USER_ROLE=Admin
      - _AIRFLOW_WWW_USER_EMAIL=admin@example.com
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scrapper:/opt/airflow/scrapper
      - ./dbt_transformation:/opt/airflow/dbt_transformation
      # Sesuaikan path profiles.yml dbt kamu
      - ~/.dbt:/home/airflow/.dbt 
    ports:
      - "8081:8080"
    command: bash -c "airflow db upgrade && (airflow webserver & airflow scheduler)"
    networks:
      - de-network
    depends_on:
      - postgres_db

networks:
  de-network:
    driver: bridge

volumes:
  ollama_data:
  mssql_data: